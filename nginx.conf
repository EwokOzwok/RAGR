server {
    listen 5098;
    server_name localhost;

    client_max_body_size 250M;

    # Route file upload / RAG API calls to the Flask backend
    location /ragr_upload {
        proxy_pass http://127.0.0.1:5099/ragr_upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 250M;
    }

    location /process_ragr {
        proxy_pass http://127.0.0.1:5099/process_ragr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /start_rag {
        proxy_pass http://127.0.0.1:5099/start_rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:5099/health;
        proxy_set_header Host $host;
    }

    # Everything else goes to Shiny (including websocket traffic for reactivity)
    location / {
        proxy_pass http://127.0.0.1:5100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support - required for Shiny's reactivity
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}